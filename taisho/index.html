<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a3d2e">
  <title>たいしょうパズル</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
    body {
      font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', Meiryo, sans-serif;
      background: linear-gradient(160deg, #0a3d2e 0%, #155740 50%, #0a3028 100%);
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; min-height: -webkit-fill-available;
    }
    .menu-back {
      position: fixed; top: max(env(safe-area-inset-top,0px),10px); left: 12px; z-index: 999;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: #fff; font-size: 13px; font-weight: 700; padding: 6px 12px; border-radius: 20px;
      text-decoration: none; backdrop-filter: blur(8px);
    }
    .mute-btn {
      position: fixed; top: max(env(safe-area-inset-top,0px),10px); right: 12px; z-index: 999;
      width: 40px; height: 40px; background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; font-size: 20px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); touch-action: manipulation; color: white;
    }
    .screen { display: none; width: 100%; max-width: 480px; flex-direction: column; align-items: center; flex: 1; }
    .screen.active { display: flex; }

    #screen-level {
      padding-top: max(env(safe-area-inset-top,0px), 60px);
      overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 20px;
    }
    .level-header { text-align: center; padding: 0 20px 20px; }
    .level-header .logo { font-size: clamp(44px,12vw,60px); margin-bottom: 4px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .level-header h1 { font-size: clamp(22px,7vw,30px); font-weight:900; color:#fff; margin-bottom:4px; }
    .level-header p  { font-size: clamp(12px,3.5vw,15px); color:rgba(255,255,255,.6); }
    .level-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: clamp(10px,3vw,14px); padding: 0 clamp(12px,4vw,20px) 20px; width: 100%;
    }
    .level-card {
      background: #fff; border-radius: clamp(14px,4vw,20px);
      padding: clamp(10px,3vw,14px); display: flex; flex-direction: column;
      align-items: center; gap: 6px; box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      cursor: pointer; transition: transform .15s; touch-action: manipulation; position: relative;
    }
    .level-card:active { transform: scale(0.95); }
    .level-card.cleared { border: 2.5px solid #4ade80; }
    .preview-canvas { border-radius: 8px; display: block; }
    .level-card-num { font-size: clamp(10px,3vw,12px); font-weight:800; color:#fff; background:#155740; border-radius:20px; padding:2px 10px; }
    .level-card-name { font-size: clamp(12px,3.5vw,14px); font-weight:800; color:#333; text-align:center; }
    .level-type-badge { font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 10px; color: #fff; }
    .badge-lr   { background: #667eea; }
    .badge-tb   { background: #e91e8c; }
    .badge-4way { background: #0097a7; }
    .level-cleared-badge {
      position:absolute; top:-6px; right:-6px; background:#4ade80; color:#fff;
      border-radius:50%; width:22px; height:22px; display:none;
      align-items:center; justify-content:center; font-size:13px;
    }
    .level-card.cleared .level-cleared-badge { display:flex; }

    #screen-game {
      padding-top: max(env(safe-area-inset-top,0px), 58px);
      justify-content: flex-start; gap: 8px;
    }
    .game-topbar {
      width: 100%; display: flex; align-items: center; gap: 10px; padding: 0 16px; height: 44px;
    }
    .game-back {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; touch-action: manipulation;
    }
    .game-level-name { flex:1; font-size:clamp(14px,4vw,18px); font-weight:800; color:#fff; text-align:center; }
    .game-level-num  { font-size:clamp(12px,3.5vw,15px); color:rgba(255,255,255,.6); font-weight:700; }
    .hint-text {
      font-size: clamp(12px,3.5vw,15px); color: rgba(255,255,255,.8);
      background: rgba(255,255,255,0.12); border-radius: 20px; padding: 5px 16px; text-align: center;
    }
    .canvas-wrap { position: relative; flex-shrink: 0; }
    #game-canvas {
      display: block; border-radius: clamp(14px,4vw,20px);
      background: #f8f5ff; box-shadow: 0 8px 32px rgba(0,0,0,0.3); touch-action: none;
    }
    .legend { display: flex; gap: 16px; align-items: center; }
    .legend-item { display:flex; align-items:center; gap:5px; font-size:clamp(11px,3vw,13px); color:rgba(255,255,255,.8); }
    .legend-dot { width:16px; height:3.5px; border-radius:2px; }
    .legend-dot.tmpl { background:#7c5cbf; }
    .legend-dot.user { background:#ff7043; }
    .action-row { display:flex; gap:12px; width:100%; padding:0 16px; }
    .btn-clear {
      flex:0 0 56px; height:52px; border-radius:14px;
      background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3);
      color:#fff; font-size:20px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; touch-action:manipulation;
    }
    .btn-check {
      flex:1; height:52px; border-radius:14px;
      background:linear-gradient(135deg,#27ae60,#2ecc71); border:none; color:#fff;
      font-size:clamp(15px,4.5vw,18px); font-weight:800;
      cursor:pointer; box-shadow:0 6px 20px rgba(46,204,113,0.4); touch-action:manipulation;
    }
    .btn-check:active { transform:scale(.97); }

    #screen-clear {
      justify-content: center;
      padding: 20px 20px max(env(safe-area-inset-bottom,0px),20px);
    }
    .clear-card {
      background: #fff; border-radius: clamp(20px,5vw,28px);
      padding: clamp(24px,6vw,36px) clamp(20px,5vw,32px);
      text-align: center; width: 100%; box-shadow: 0 16px 48px rgba(0,0,0,0.3);
    }
    .clear-emoji { font-size: clamp(56px,16vw,72px); margin-bottom:8px; animation: pop .5s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
    .clear-title { font-size:clamp(26px,8vw,34px); font-weight:900; color:#155740; margin-bottom:4px; }
    .clear-sub   { font-size:clamp(13px,3.5vw,16px); color:#888; margin-bottom:6px; }
    .clear-level { font-size:clamp(15px,4.5vw,18px); font-weight:800; color:#7c5cbf; margin-bottom:20px; }
    .clear-stars { font-size:clamp(30px,9vw,40px); margin-bottom:20px; }
    .clear-btns { display:flex; flex-direction:column; gap:10px; }
    .btn-next {
      padding:clamp(14px,4vw,18px); border-radius:clamp(14px,4vw,20px);
      border:none; background:linear-gradient(135deg,#27ae60,#2ecc71); color:#fff;
      font-size:clamp(16px,4.5vw,20px); font-weight:900;
      cursor:pointer; box-shadow:0 6px 20px rgba(46,204,113,.4); touch-action:manipulation;
    }
    .btn-retry {
      padding:clamp(12px,3.5vw,16px); border-radius:clamp(14px,4vw,20px);
      border:none; background:rgba(21,87,64,0.1); color:#155740;
      font-size:clamp(14px,4vw,17px); font-weight:700; cursor:pointer; touch-action:manipulation;
    }
    .btn-home {
      padding:clamp(11px,3vw,14px); border-radius:clamp(14px,4vw,20px);
      border:2px solid #ddd; background:#fff; color:#888;
      font-size:clamp(13px,3.5vw,16px); font-weight:700; cursor:pointer; touch-action:manipulation;
    }
    .confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:998; overflow:hidden; }
    .confetti-piece { position:absolute; border-radius:2px; animation:fall linear forwards; }
    @keyframes fall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
    .err-flash { animation: errShake 0.4s ease; }
    @keyframes errShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  </style>
</head>
<body>

<a class="menu-back" href="../index.html">← メニュー</a>
<button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>

<div id="screen-level" class="screen active">
  <div class="level-header">
    <div class="logo">🪞</div>
    <h1>たいしょうパズル</h1>
    <p>かがみのように せんをひいてね！</p>
  </div>
  <div class="level-grid" id="level-grid"></div>
</div>

<div id="screen-game" class="screen">
  <div class="game-topbar">
    <button class="game-back" onclick="showScreen('level')">←</button>
    <div class="game-level-name" id="game-level-name"></div>
    <div class="game-level-num"  id="game-level-num"></div>
  </div>
  <div class="hint-text" id="hint-text"></div>
  <div class="canvas-wrap"><canvas id="game-canvas"></canvas></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot tmpl"></div>おてほん</div>
    <div class="legend-item"><div class="legend-dot user"></div>きみがひく</div>
  </div>
  <div class="action-row">
    <button class="btn-clear" onclick="clearUserLines()">🗑️</button>
    <button class="btn-check" onclick="checkAnswer()">こたえあわせ ✓</button>
  </div>
</div>

<div id="screen-clear" class="screen">
  <div class="clear-card">
    <div class="clear-emoji">🎉</div>
    <div class="clear-title">せいかい！</div>
    <div class="clear-sub">たいしょうに なってるよ！</div>
    <div class="clear-level" id="clear-level-name"></div>
    <div class="clear-stars">⭐⭐⭐</div>
    <div class="clear-btns">
      <button class="btn-next" id="btn-next" onclick="nextLevel()">つぎのレベルへ ▶</button>
      <button class="btn-retry" onclick="retryLevel()">もういちど 🔄</button>
      <button class="btn-home"  onclick="showScreen('level')">レベルえらび 🏠</button>
    </div>
  </div>
</div>

<div class="confetti-wrap" id="confetti-wrap"></div>

<script>
// ── Audio ────────────────────────────────────────────
const AudioEngine = (() => {
  let ctx=null, master=null, muted=false, bgmOn=false, bgmTimer=null;
  function init() {
    if (!ctx) { ctx=new(window.AudioContext||window.webkitAudioContext)(); master=ctx.createGain(); master.connect(ctx.destination); }
    if (ctx.state==='suspended') ctx.resume(); return ctx;
  }
  function note(f,s,d,tp='triangle',v=0.3) {
    const c=init(),o=c.createOscillator(),g=c.createGain();
    o.type=tp; o.frequency.value=f; g.gain.setValueAtTime(v,s); g.gain.exponentialRampToValueAtTime(0.001,s+d);
    o.connect(g); g.connect(master); o.start(s); o.stop(s+d+0.05);
  }
  const MEL=[[523,.5],[659,.5],[784,.5],[0,.5],[659,.5],[523,.5],[392,.75],[0,.75],[440,.5],[523,.5],[659,.5],[0,.5],[784,.5],[659,.5],[523,1],[0,1]];
  function sBGM() {
    if(!bgmOn) return;
    const c=init(); let t=c.currentTime+0.05,tot=0;
    MEL.forEach(([f,d])=>{ if(f>0) note(f,t,d*.55*.78,'triangle',.09); t+=d*.55; tot+=d*.55; });
    bgmTimer=setTimeout(sBGM,(tot-.2)*1000);
  }
  return {
    startBGM(){if(bgmOn)return;bgmOn=true;sBGM();},
    stopBGM(){bgmOn=false;clearTimeout(bgmTimer);},
    playSelect(){const c=init(),t=c.currentTime;note(880,t,.08,'sine',.14);},
    playDraw(){const c=init(),t=c.currentTime;note(660,t,.07,'triangle',.18);note(880,t+.07,.1,'triangle',.13);},
    playErase(){const c=init(),t=c.currentTime;note(523,t,.07,'triangle',.15);note(392,t+.07,.1,'triangle',.11);},
    playWrong(){const c=init(),t=c.currentTime;note(311,t,.2,'triangle',.2);note(262,t+.22,.3,'triangle',.16);},
    playFanfare(){const c=init(),t=c.currentTime;[[523,0],[659,.12],[784,.24],[1047,.38],[1319,.54]].forEach(([f,d])=>note(f,t+d,.55,'triangle',.42));},
    toggleMute(){muted=!muted;if(master)master.gain.value=muted?0:1;return muted;},
  };
})();
function toggleMute(){document.getElementById('mute-btn').textContent=AudioEngine.toggleMute()?'🔇':'🔊';}

// ── Grid ─────────────────────────────────────────────
const GRID=12, MAX=11;
let CSS_SIZE=0, CELL=0, PAD=0, gameCtx=null;
const dotX=c=>PAD+c*CELL, dotY=r=>PAD+r*CELL;

// ── Levels ───────────────────────────────────────────
// LR  = 左右対称: template=col<=5, mirror col→11-col
// TB  = 上下対称: template=row<=5, mirror row→11-row
// 4WAY= 四方向:   template=col<=5&&row<=5, 3方向ミラー
// 全て「全体で1つの絵」になるように設計
const levels = [
  { name:'じゅうじ',   icon:'✚',  type:'LR',
    hint:'ひだり↔みぎ かがみに うつしてね！',
    segments:[[5,1,5,10],[1,5,5,5]] },

  { name:'ロケット',   icon:'🚀', type:'LR',
    hint:'ロケットをかんせいさせよう！',
    segments:[[5,1,3,3],[3,3,3,9],[3,3,5,3],[3,9,5,9],[3,9,1,11]] },

  { name:'やじるし',   icon:'⬆',  type:'LR',
    hint:'うえにむいた やじるし！',
    segments:[[5,0,0,5],[0,5,5,5],[5,5,5,11]] },

  { name:'ハート',     icon:'❤',  type:'LR',
    hint:'ハートをかんせいさせよう！',
    segments:[[5,3,2,0],[2,0,0,2],[0,2,0,4],[0,4,5,9]] },

  { name:'き',         icon:'🌲', type:'LR',
    hint:'みき と えだ！きのかたち',
    segments:[[5,1,2,4],[2,4,5,4],[5,4,1,7],[1,7,5,7],[5,7,5,11]] },

  { name:'ダイヤ',     icon:'💎', type:'TB',
    hint:'うえ↕した かがみに うつしてね！',
    segments:[[5,0,0,5],[5,0,10,5]] },

  { name:'すなどけい', icon:'⏳', type:'TB',
    hint:'すなどけいのかたち！',
    segments:[[1,0,10,0],[1,0,5,5],[10,0,5,5]] },

  { name:'おはな',     icon:'🌸', type:'4WAY',
    hint:'4まいのはなびら！かけるかな？',
    segments:[[5,1,2,4],[2,4,5,4]] },

  { name:'ゆきのけっしょう', icon:'❄', type:'4WAY',
    hint:'ゆきのけっしょう！ちょうせん！',
    segments:[[5,1,5,5],[5,3,3,5],[5,3,4,1]] },
];

// ── State ────────────────────────────────────────────
let currentLevel=0, selDot=null, userSegs=[], clearedLevels={};

// ── Geometry ─────────────────────────────────────────
function normSeg(c1,r1,c2,r2) {
  if(c1>c2||(c1===c2&&r1>r2)){[c1,c2]=[c2,c1];[r1,r2]=[r2,r1];}
  return `${c1},${r1}-${c2},${r2}`;
}
function isTmpl(col,row,type) {
  if(!type) type=levels[currentLevel].type;
  if(type==='LR') return col<=5;
  if(type==='TB') return row<=5;
  return col<=5&&row<=5;
}
function getReq(segs,type) {
  const s=new Set();
  segs.forEach(([c1,r1,c2,r2])=>{
    if(type==='LR'||type==='4WAY') s.add(normSeg(MAX-c1,r1,MAX-c2,r2));
    if(type==='TB'||type==='4WAY') s.add(normSeg(c1,MAX-r1,c2,MAX-r2));
    if(type==='4WAY')              s.add(normSeg(MAX-c1,MAX-r1,MAX-c2,MAX-r2));
  });
  return s;
}

// ── Canvas ───────────────────────────────────────────
function initCanvas() {
  const canvas=document.getElementById('game-canvas');
  const dpr=window.devicePixelRatio||1;
  CSS_SIZE=Math.min(window.innerWidth-32,window.innerHeight-240,360);
  canvas.style.width=CSS_SIZE+'px'; canvas.style.height=CSS_SIZE+'px';
  canvas.width=Math.round(CSS_SIZE*dpr); canvas.height=Math.round(CSS_SIZE*dpr);
  gameCtx=canvas.getContext('2d'); gameCtx.scale(dpr,dpr);
  PAD=14; CELL=(CSS_SIZE-PAD*2)/(GRID-1);
  canvas.onpointerdown=onPtr;
}

function render() {
  if(!gameCtx) return;
  const ctx=gameCtx, lv=levels[currentLevel];
  ctx.clearRect(0,0,CSS_SIZE,CSS_SIZE);
  const axX=(dotX(5)+dotX(6))/2, axY=(dotY(5)+dotY(6))/2;

  // テンプレートゾーン背景
  ctx.fillStyle='rgba(124,92,191,0.07)';
  if(lv.type==='LR')   ctx.fillRect(0,0,axX,CSS_SIZE);
  else if(lv.type==='TB')   ctx.fillRect(0,0,CSS_SIZE,axY);
  else                       ctx.fillRect(0,0,axX,axY);

  // 軸線
  ctx.save(); ctx.setLineDash([Math.round(CELL*.25),Math.round(CELL*.18)]);
  ctx.strokeStyle='rgba(124,92,191,0.4)'; ctx.lineWidth=1.5;
  if(lv.type==='LR'||lv.type==='4WAY'){ctx.beginPath();ctx.moveTo(axX,0);ctx.lineTo(axX,CSS_SIZE);ctx.stroke();}
  if(lv.type==='TB'||lv.type==='4WAY'){ctx.beginPath();ctx.moveTo(0,axY);ctx.lineTo(CSS_SIZE,axY);ctx.stroke();}
  ctx.restore();

  ctx.fillStyle='rgba(124,92,191,0.5)'; ctx.font=`bold ${Math.round(CELL*.52)}px sans-serif`;
  ctx.fillText('おてほん',PAD+2,PAD+CELL*.6);

  drawSegs(ctx,lv.segments,'#7c5cbf',3.5);
  drawSegs(ctx,userSegs,'#ff7043',3.5);
  drawDots(ctx,lv.type);

  if(selDot){
    const[col,row]=selDot;
    ctx.beginPath();ctx.arc(dotX(col),dotY(row),CELL*.28,0,Math.PI*2);ctx.strokeStyle='#ffd700';ctx.lineWidth=2.5;ctx.stroke();
    ctx.beginPath();ctx.arc(dotX(col),dotY(row),CELL*.12,0,Math.PI*2);ctx.fillStyle='#ffd700';ctx.fill();
  }
}
function drawSegs(ctx,segs,color,w){
  ctx.strokeStyle=color;ctx.lineWidth=w;ctx.lineCap='round';
  segs.forEach(([c1,r1,c2,r2])=>{ctx.beginPath();ctx.moveTo(dotX(c1),dotY(r1));ctx.lineTo(dotX(c2),dotY(r2));ctx.stroke();});
}
function drawDots(ctx,type){
  const r=Math.max(3,CELL*.13);
  for(let row=0;row<GRID;row++) for(let col=0;col<GRID;col++){
    ctx.beginPath();ctx.arc(dotX(col),dotY(row),r,0,Math.PI*2);
    ctx.fillStyle=isTmpl(col,row,type)?'#5a3d8c':'#8080b0'; ctx.fill();
  }
}

// ── Touch ────────────────────────────────────────────
function onPtr(e){
  e.preventDefault();
  const canvas=document.getElementById('game-canvas'),rect=canvas.getBoundingClientRect();
  const px=(e.clientX-rect.left)*(CSS_SIZE/rect.width), py=(e.clientY-rect.top)*(CSS_SIZE/rect.height);
  const dot=snap(px,py); if(!dot){selDot=null;render();return;}
  const[col,row]=dot;
  if(isTmpl(col,row)) return;
  if(!selDot){selDot=[col,row];AudioEngine.playSelect();}
  else{
    const[sc,sr]=selDot;
    if(sc===col&&sr===row){selDot=null;}
    else{
      const key=normSeg(sc,sr,col,row);
      const idx=userSegs.findIndex(s=>normSeg(...s)===key);
      if(idx>=0){userSegs.splice(idx,1);AudioEngine.playErase();}
      else{userSegs.push([sc,sr,col,row]);AudioEngine.playDraw();}
      selDot=null; autoChk();
    }
  }
  render();
}
function snap(px,py){
  const S=CELL*.52; let best=null,bd=Infinity;
  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++){
    const d=Math.hypot(px-dotX(c),py-dotY(r)); if(d<S&&d<bd){bd=d;best=[c,r];}
  }
  return best;
}

// ── Check ────────────────────────────────────────────
function autoChk(){
  const lv=levels[currentLevel],req=getReq(lv.segments,lv.type);
  if(userSegs.length===req.size&&chkSym(req)) onClear();
}
function checkAnswer(){
  const lv=levels[currentLevel],req=getReq(lv.segments,lv.type);
  if(chkSym(req)) onClear();
  else{
    AudioEngine.playWrong();
    const c=document.getElementById('game-canvas');
    c.classList.add('err-flash');setTimeout(()=>c.classList.remove('err-flash'),500);
  }
}
function chkSym(req){
  if(!req) req=getReq(levels[currentLevel].segments,levels[currentLevel].type);
  if(userSegs.length!==req.size) return false;
  const us=new Set(userSegs.map(s=>normSeg(...s)));
  for(const seg of req) if(!us.has(seg)) return false;
  return true;
}

// ── Flow ─────────────────────────────────────────────
function startLevel(idx){
  currentLevel=idx; userSegs=[]; selDot=null;
  const lv=levels[idx];
  document.getElementById('game-level-name').textContent=lv.name;
  document.getElementById('game-level-num').textContent=`Lv.${idx+1}`;
  document.getElementById('hint-text').textContent=`💡 ${lv.hint}`;
  showScreen('game'); initCanvas(); render(); AudioEngine.startBGM();
}
function onClear(){
  AudioEngine.stopBGM(); AudioEngine.playFanfare();
  if(gameCtx){drawSegs(gameCtx,userSegs,'#27ae60',4);drawSegs(gameCtx,levels[currentLevel].segments,'#27ae60',4);drawDots(gameCtx,levels[currentLevel].type);}
  clearedLevels[currentLevel]=true;
  try{localStorage.setItem('taishoCleared',JSON.stringify(clearedLevels));}catch(e){}
  launchConfetti(28);
  document.getElementById('clear-level-name').textContent=levels[currentLevel].name;
  document.getElementById('btn-next').style.display=currentLevel>=levels.length-1?'none':'';
  setTimeout(()=>showScreen('clear'),900);
}
function clearUserLines(){userSegs=[];selDot=null;render();}
function nextLevel(){startLevel(Math.min(currentLevel+1,levels.length-1));}
function retryLevel(){startLevel(currentLevel);}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  if(name==='level'){AudioEngine.stopBGM();buildLevelCards();}
}

// ── Level cards ──────────────────────────────────────
function buildLevelCards(){
  const grid=document.getElementById('level-grid'); grid.innerHTML='';
  levels.forEach((lv,idx)=>{
    const card=document.createElement('div');
    card.className='level-card'+(clearedLevels[idx]?' cleared':'');
    card.onclick=()=>startLevel(idx);

    const bdg=document.createElement('div'); bdg.className='level-cleared-badge'; bdg.textContent='✓'; card.appendChild(bdg);

    const sz=Math.min(Math.floor((window.innerWidth-80)/2),110);
    const pc=document.createElement('canvas'); pc.className='preview-canvas'; card.appendChild(pc);

    const ne=document.createElement('div'); ne.className='level-card-num'; ne.textContent=`Lv. ${idx+1}`; card.appendChild(ne);
    const nme=document.createElement('div'); nme.className='level-card-name'; nme.textContent=lv.name; card.appendChild(nme);

    const tb=document.createElement('div');
    tb.className='level-type-badge '+(lv.type==='LR'?'badge-lr':lv.type==='TB'?'badge-tb':'badge-4way');
    tb.textContent=lv.type==='LR'?'←→':lv.type==='TB'?'↑↓':'＊'; card.appendChild(tb);

    grid.appendChild(card);
    renderPrev(pc,sz,lv);
  });
}

function renderPrev(canvas,size,lv){
  const dpr=window.devicePixelRatio||1;
  canvas.width=size*dpr; canvas.height=size*dpr;
  canvas.style.width=size+'px'; canvas.style.height=size+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const pad=5, cell=(size-pad*2)/(GRID-1);
  const dx=c=>pad+c*cell, dy=r=>pad+r*cell;
  const axX=(dx(5)+dx(6))/2, axY=(dy(5)+dy(6))/2;

  ctx.fillStyle='rgba(124,92,191,0.07)';
  if(lv.type==='LR') ctx.fillRect(0,0,axX,size);
  else if(lv.type==='TB') ctx.fillRect(0,0,size,axY);
  else ctx.fillRect(0,0,axX,axY);

  ctx.save(); ctx.setLineDash([3,2]); ctx.strokeStyle='rgba(124,92,191,0.3)'; ctx.lineWidth=0.8;
  if(lv.type==='LR'||lv.type==='4WAY'){ctx.beginPath();ctx.moveTo(axX,0);ctx.lineTo(axX,size);ctx.stroke();}
  if(lv.type==='TB'||lv.type==='4WAY'){ctx.beginPath();ctx.moveTo(0,axY);ctx.lineTo(size,axY);ctx.stroke();}
  ctx.restore();

  const dp=(segs,color,w)=>{
    ctx.strokeStyle=color;ctx.lineWidth=w;ctx.lineCap='round';
    segs.forEach(([c1,r1,c2,r2])=>{ctx.beginPath();ctx.moveTo(dx(c1),dy(r1));ctx.lineTo(dx(c2),dy(r2));ctx.stroke();});
  };
  dp(lv.segments,'#7c5cbf',Math.max(1.5,cell*.12));

  // ミラー済みセグメントも描画（完成形を表示）
  const msegs=[];
  getReq(lv.segments,lv.type).forEach(key=>{
    const[a,b]=key.split('-');const[c1,r1]=a.split(',').map(Number);const[c2,r2]=b.split(',').map(Number);
    msegs.push([c1,r1,c2,r2]);
  });
  dp(msegs,'rgba(255,112,67,0.55)',Math.max(1,cell*.1));

  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++){
    const tmpl=(lv.type==='LR'?c<=5:lv.type==='TB'?r<=5:(c<=5&&r<=5));
    ctx.beginPath();ctx.arc(dx(c),dy(r),Math.max(1.5,cell*.1),0,Math.PI*2);
    ctx.fillStyle=tmpl?'#5a3d8c':'#9090b8'; ctx.fill();
  }
}

// ── Confetti ─────────────────────────────────────────
function launchConfetti(n){
  const wrap=document.getElementById('confetti-wrap');
  const cols=['#27ae60','#f093fb','#56ccf2','#ffe74c','#667eea','#ff9a00'];
  for(let i=0;i<n;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${1.2+Math.random()*2}s;animation-delay:${Math.random()*.5}s;width:${8+Math.random()*9}px;height:${8+Math.random()*9}px;`;
    wrap.appendChild(p); setTimeout(()=>p.remove(),3500);
  }
}

// ── Init ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  try{clearedLevels=JSON.parse(localStorage.getItem('taishoCleared')||'{}');}catch(e){}
  buildLevelCards();
});
document.body.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
</script>
