<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>まなびランド 🌟</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', Meiryo, sans-serif;
      background: #0f0c29;
      background: linear-gradient(160deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px)
               env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
      padding: 40px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── ヘッダー ── */
    .stars-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle linear infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.4); }
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }
    .logo-emoji {
      font-size: 64px;
      animation: bounce 2s ease-in-out infinite;
      display: block;
      margin-bottom: 8px;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50%      { transform: translateY(-12px) rotate(5deg); }
    }
    .logo-title {
      font-size: clamp(28px, 9vw, 40px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,215,0,0.6);
      margin-bottom: 6px;
    }
    .logo-title span { color: #ffd700; }
    .logo-sub {
      font-size: clamp(13px, 3.5vw, 16px);
      color: rgba(255,255,255,0.55);
    }

    /* ── ゲームカード ── */
    .games {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .game-card {
      border-radius: 28px;
      overflow: hidden;
      text-decoration: none;
      display: block;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      transition: transform .2s, box-shadow .2s;
      position: relative;
    }
    .game-card:active { transform: scale(0.97); }

    .card-inner {
      padding: clamp(22px, 6vw, 32px);
      display: flex;
      align-items: center;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    /* さんすう */
    .card-sansuu {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .card-sansuu::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    }

    /* かんじ */
    .card-kanji {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border: 2px solid rgba(255,215,0,0.3);
    }
    .card-kanji::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 50%, rgba(255,215,0,0.08) 0%, transparent 60%);
    }

    .card-icon {
      width: clamp(72px, 20vw, 90px);
      height: clamp(72px, 20vw, 90px);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(36px, 10vw, 48px);
      flex-shrink: 0;
    }
    .card-sansuu .card-icon { background: rgba(255,255,255,0.2); }
    .card-kanji  .card-icon { background: rgba(255,215,0,0.15); }
    .card-taisho .card-icon { background: rgba(255,255,255,0.2); }

    /* たいしょうパズル */
    .card-taisho {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    }
    .card-taisho::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
    }
    .card-taisho .card-tag { color: rgba(255,255,255,0.75); }

    .card-text { flex: 1; }
    .card-tag {
      font-size: clamp(10px, 2.5vw, 12px);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .card-sansuu .card-tag { color: rgba(255,255,255,0.7); }
    .card-kanji  .card-tag { color: rgba(255,215,0,0.8); }

    .card-title {
      font-size: clamp(20px, 6vw, 26px);
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: clamp(12px, 3.2vw, 14px);
      color: rgba(255,255,255,0.65);
      line-height: 1.4;
    }

    .card-arrow {
      font-size: 26px;
      color: rgba(255,255,255,0.6);
      flex-shrink: 0;
      animation: pulse-arrow 1.8s ease-in-out infinite;
    }
    @keyframes pulse-arrow {
      0%,100% { transform: translateX(0); opacity: 0.6; }
      50%      { transform: translateX(5px); opacity: 1; }
    }

    /* バッジ */
    .new-badge {
      position: absolute;
      top: 14px; right: 14px;
      background: #f5576c;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 9px;
      border-radius: 10px;
      letter-spacing: 0.5px;
    }

    /* ── フッター ── */
    .footer {
      margin-top: 32px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .footer p {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>

<!-- 星背景 -->
<div class="stars-bg" id="stars"></div>

<div class="wrap">
  <!-- ヘッダー -->
  <div class="header">
    <span class="logo-emoji">🌟</span>
    <div class="logo-title">まなび<span>ランド</span></div>
    <div class="logo-sub">すきなゲームをえらんでね！</div>
  </div>

  <!-- ゲーム選択 -->
  <div class="games">

    <a class="game-card card-sansuu" href="sansuu/index.html">
      <div class="card-inner">
        <div class="card-icon">🔢</div>
        <div class="card-text">
          <div class="card-tag">MATH GAME</div>
          <div class="card-title">さんすう<br>チャレンジ！</div>
          <div class="card-desc">たしざん・ひきざん・かけざん<br>1〜3ねんせい むけ</div>
        </div>
        <div class="card-arrow">▶</div>
      </div>
    </a>

    <a class="game-card card-kanji" href="kanji/index.html">
      <div class="card-inner">
        <div class="card-icon">🐉</div>
        <div class="card-text">
          <div class="card-tag">KANJI GAME</div>
          <div class="card-title">かんじ<br>モンスター</div>
          <div class="card-desc">かんじをかいて<br>モンスターをゲット！</div>
        </div>
        <div class="card-arrow">▶</div>
      </div>
      <div class="new-badge">NEW</div>
    </a>

    <a class="game-card card-taisho" href="taisho/index.html">
      <div class="card-inner">
        <div class="card-icon">🪞</div>
        <div class="card-text">
          <div class="card-tag">PUZZLE</div>
          <div class="card-title">たいしょう<br>パズル</div>
          <div class="card-desc">かがみのように せんをひいて<br>ずけいをかんせいさせよう！</div>
        </div>
        <div class="card-arrow">▶</div>
      </div>
      <div class="new-badge">NEW</div>
    </a>

  </div>

  <div class="footer">
    <p>🎮 3つのゲームで楽しく学ぼう！</p>
  </div>
</div>

<script>
// 星を生成
(function() {
  const wrap = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = 1 + Math.random() * 3;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      animation-duration:${2+Math.random()*4}s;
      animation-delay:${Math.random()*4}s;
    `;
    wrap.appendChild(s);
  }
})();
</script>
</body>
</html>
